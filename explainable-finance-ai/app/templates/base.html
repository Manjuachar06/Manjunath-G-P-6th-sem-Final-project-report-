<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Explainable Finance AI{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #2a6fdb 0%, #4a90e2 100%);
            color: #ffffff;
            padding: 40px 20px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
            color: #f4faff;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.95;
            color: #e0eafb;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab-button {
            flex: 1;
            padding: 20px;
            text-align: center;
            background: #f5f5f5;
            border: none;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: 600;
            color: #666;
            transition: all 0.3s ease;
        }

        .tab-button:hover {
            background: #eeeeee;
        }

        .tab-button.active {
            background: white;
            color: #667eea;
            border-bottom: 3px solid #667eea;
            margin-bottom: -2px;
        }

        .tab-content {
            display: none;
            padding: 40px;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input[type="number"],
        input[type="text"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }

        input[type="number"]:focus,
        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        button.predict-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button.predict-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button.predict-btn:active {
            transform: translateY(0);
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 5px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result.success {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
        }

        .result.fraud {
            background: #ffebee;
            border-left: 4px solid #f44336;
        }

        .result.high-risk {
            background: #ffebee;
            border-left: 4px solid #f44336;
        }

        .result.low-risk {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
        }

        .result.error {
            background: #fff3e0;
            border-left: 4px solid #ff9800;
        }

        .result h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .result-metric {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
        }

        .result-metric label {
            margin: 0;
            font-weight: 500;
            color: #666;
        }

        .result-metric .value {
            font-size: 1.3em;
            font-weight: 700;
            color: #667eea;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            color: #f44336;
            font-weight: 600;
            margin-top: 10px;
        }

        .evaluation-section {
            margin-top: 35px;
            padding: 25px;
            background: #f4f6ff;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.08);
        }

        .evaluation-section h2 {
            margin-bottom: 20px;
            color: #2c3e70;
            text-align: center;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 18px;
            margin-bottom: 28px;
        }

        .metric-card {
            padding: 20px;
            background: white;
            border-radius: 12px;
            border: 1px solid rgba(102, 126, 234, 0.14);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
        }

        .metric-card h4 {
            margin-bottom: 15px;
            color: #33415c;
        }

        .metric-card p {
            margin: 8px 0;
            color: #4b5563;
            line-height: 1.5;
        }

        .graph-row {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 20px;
        }

        .graph-card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
        }

        .graph-card h4 {
            margin-bottom: 12px;
            font-size: 1em;
            color: #2c3e70;
        }

        .graph-image {
            width: 100%;
            height: auto;
            border-radius: 10px;
            display: block;
        }

        /* Model Comparison Styles */
        .models-comparison {
            margin-top: 30px;
            animation: slideIn 0.3s ease;
        }

        .models-comparison h3 {
            margin-bottom: 25px;
            font-size: 1.5em;
            color: #333;
            text-align: center;
        }

        .model-card {
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 5px solid #667eea;
            background: #f9f9f9;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .model-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
        }

        .model-card.high-risk {
            border-left-color: #f44336;
            background: #ffebee;
        }

        .model-card.low-risk {
            border-left-color: #4caf50;
            background: #e8f5e9;
        }

        .model-header {
            font-size: 1.2em;
            font-weight: 700;
            margin-bottom: 15px;
            color: #333;
        }

        .result-metric {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 12px 0;
            padding: 8px 0;
        }

        .result-metric label {
            margin: 0;
            font-weight: 600;
            color: #555;
            font-size: 0.95em;
        }

        .result-metric .value {
            font-size: 1.4em;
            font-weight: 700;
            color: #667eea;
            text-align: right;
        }

        .decision-threshold {
            margin-top: 25px;
            padding: 15px;
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            border-radius: 4px;
            color: #555;
            font-size: 0.95em;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 1.8em;
            }

            .tab-content {
                padding: 20px;
            }

            .model-card {
                padding: 20px;
            }

            .result-metric {
                flex-direction: column;
                align-items: flex-start;
            }

            .result-metric .value {
                text-align: left;
                margin-top: 8px;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="container">
        <header>
            <h1>Financial AI</h1>
            <p>Credit Risk Assessment</p>
        </header>

        {% block content %}{% endblock %}
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
